---
version: 2
updates:

    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly

    - package-ecosystem: uv
      directory: /
      schedule:
          interval: weekly
      groups:
          - name: lockfile
            patterns:
                - '*'

    - package-ecosystem: pre-commit
      directory: /
      schedule:
          interval: weekly
